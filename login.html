<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KnowledgeVerse Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<h1>🚀 KnowledgeVerse</h1>

<p>
Interactive Learning & Entertainment Hub
</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="loginMsg"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
